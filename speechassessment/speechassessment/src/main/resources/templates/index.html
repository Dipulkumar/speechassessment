<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multilingual Speech Translation</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", system-ui, sans-serif;
}

body {
  display:flex;
  height:100vh;
  background: linear-gradient(180deg, #f0fff4, #d9fdd3);
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#00a884;
  color:white;
  padding:15px;
  display:flex;
  flex-direction:column;
}

.new-chat {
  background:white;
  color:#00a884;
  padding:10px;
  border-radius:8px;
  text-align:center;
  cursor:pointer;
  margin-bottom:15px;
  font-weight:600;
}

.chat-item {
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}
.chat-item:hover {
  background:#019874;
}

/* MAIN */
.main {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header {
  background:#00a884;
  padding:25px;
  color:white;
  text-align:center;
  font-weight:700;
  font-size:26px;
  letter-spacing:1px;
}

/* CHAT */
.chat-box {
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:14px;
  background:#e6ffda;
}

.msg {
  max-width:75%;
  padding:12px;
  border-radius:12px;
  font-size:14px;
  box-shadow:0 2px 6px #0000000a;
}

.center-msg {
  align-self:center;
  background:#fff;
}

.user1 {
  align-self:flex-end;
  background:#f0fff4;
}

.user2 {
  align-self:flex-start;
  background:#fff;
}

.orgtext, .transtext{
margin-bottom: 4px;
}

.orgaudio{
margin-bottom: 8px;
}

/* WAVE */
.wave {
  display:flex;
  gap:3px;
}
.bar {
  width:4px;
  height:20px;
  background:#00a884;
  animation:wave 1s infinite;
}
@keyframes wave {
  0%,100% {height:5px;}
  50% {height:20px;}
}

/* INPUT */
.input-area {
  padding:15px;
   display:flex;
  justify-content:center;
  align-items:center; 
}

.input-box {
  border-radius:50%;
  padding:10px;
  box-shadow:0 4px 10px #0000000a;
  height:70px;
  width:70px;
  background-color:#FFFFFF;

  display:flex;
  justify-content:center;
  align-items:center;
}

.micBtn {
    width: 50px;
    height: 50px;
    color: white;
    border: none;
    cursor: pointer;
    justify-content:center;
    align-items: center;

    background-image: url("/assest/microphone.png"); /* your image path */
    background-size: cover;             /* fit image */
    background-position: center;
    background-repeat: no-repeat;
    background-color: transparent;
  
}
.micBtn.rec {
background-image: url("/assest/rec.gif");
}

.time {
  font-size:10px;
  margin-top:5px;
  text-align:right;
  opacity:0.6;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="new-chat" onclick="newChat()">+ New Chat</div>
  <div id="chatList"></div>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
🎤 Multilingual Speech Translation
</div>

<div id="chatBox" class="chat-box"></div>

<div class="input-area">
  <div class="input-box">
    <button id="micBtn" class="micBtn"> </button>
  </div>
</div>

</div>

<script>
const chatBox = document.getElementById("chatBox");
const chatList = document.getElementById("chatList");

let conversationId = Date.now();
const userId = "demoUser"; // change later if login added

/* LOAD HISTORY */
async function loadHistoryList() {
  try {
    const res = await fetch(`http://localhost:8080/api/assessment/history/${userId}`);
    const data = await res.json();

    chatList.innerHTML = "";

    data.forEach(chat => {
      const item = document.createElement("div");
      item.className = "chat-item";
      item.innerText = "Chat " + chat.id;

      item.onclick = () => loadChat(chat.id);

      chatList.appendChild(item);
    });

  } catch(e) {
    console.log("History load error");
  }
}

/* LOAD SINGLE CHAT */
async function loadChat(chatId) {
  chatBox.innerHTML = "";

  try {
    const res = await fetch(`http://localhost:8080/api/assessment/chat/${chatId}`);
    const messages = await res.json();

    messages.forEach(addMessage);

  } catch(e) {
    console.log("Chat load error");
  }
}

/* NEW CHAT */
function newChat() {
  chatBox.innerHTML = "";
  conversationId = Date.now();
}

/* TIME */
function getTime() {
  return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

/* STATUS */
function addStatusMessage(text){
  const msg = document.createElement("div");
  msg.classList.add("msg","center-msg");
  msg.innerHTML = text;
  chatBox.appendChild(msg);
}

/* WAVE */
function showWave(){
  const msg = document.createElement("div");
  msg.classList.add("msg","user2");
  msg.id="wave";
  msg.innerHTML = `<div class="wave">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>`;
  chatBox.appendChild(msg);
}

function removeWave(){
  const w = document.getElementById("wave");
  if(w) w.remove();
}

/* MESSAGE */
function addMessage(data) {
  removeWave();

  const msg = document.createElement("div");
  msg.classList.add("msg","user" + (data.speaker_id || 2));

  // ✅ SAFE TEXT
  const originalText = data.original_text || data.recognizedText || "⚠️ No text received";
  const translatedText = data.translated_text || "";

  // ✅ ORIGINAL TEXT
  const Otext = document.createElement("p");
  Otext.classList.add("orgtext");
  Otext.innerHTML = "<b>Original:</b> " + originalText;
  msg.appendChild(Otext);

  // ✅ ORIGINAL AUDIO
  if (data.original_audio_url && data.original_audio_url !== "null") {
    const Oaudio = document.createElement("audio");
    Oaudio.classList.add("orgaudio");
    Oaudio.src = data.original_audio_url;
    Oaudio.controls = true;
    msg.appendChild(Oaudio);
  }

  // ✅ TRANSLATED TEXT
  if (translatedText.trim() !== "") {
    const Ttext = document.createElement("p");
    Ttext.classList.add("transtext");
    Ttext.innerHTML = "<b>Translated:</b> " + translatedText;
    msg.appendChild(Ttext);
  }

  // ✅ TRANSLATED AUDIO
  if (data.translated_audio_url && data.translated_audio_url !== "null") {
    const Taudio = document.createElement("audio");
    Taudio.src = data.translated_audio_url;
    Taudio.controls = true;
    msg.appendChild(Taudio);
  }

  // ✅ TIME
  const timecontainer = document.createElement("div");
  timecontainer.classList.add("time");
  timecontainer.innerHTML = getTime();
  msg.appendChild(timecontainer);

  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

/* SAVE CHAT */
async function saveChat(data) {
  try {
    await fetch("http://localhost:8080/api/assessment/save", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        userId:userId,
        originalText:data.original_text,
        translatedText:data.translated_text
      })
    });
  } catch(e) {
    console.log("Save error");
  }
}

/* SEND */
async function sendAudioToServer(blob) {

  showWave();

  const formData = new FormData();
  formData.append("audio", blob);

  try {
    const res = await fetch("http://localhost:5000/translate", {
      method:"POST",
      body:formData
    });

    const data = await res.json();
    addMessage(data);
    saveChat(data);

    loadHistoryList(); // refresh sidebar

  } catch(err){
    removeWave();
    addStatusMessage("❌ Error");
  }
}

/* MIC */
let recorder, chunks = [];
let isRecording = false;
const micBtn = document.getElementById("micBtn");

micBtn.onclick = async () => {

  if (isRecording) {
    recorder.stop();
    isRecording = false;
    if (micBtn.classList.contains("rec")) {
        micBtn.classList.remove("rec"); // stop
    } 
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    recorder = new MediaRecorder(stream);

    recorder.ondataavailable = e => chunks.push(e.data);

    recorder.onstop = () => {
      const blob = new Blob(chunks,{type:"audio/webm"});
      sendAudioToServer(blob);
      chunks=[];
    };

    recorder.start();
    isRecording = true;
    if (!micBtn.classList.contains("rec")) {
        micBtn.classList.add("rec"); // stop
    } 
  } catch {
    addStatusMessage("❌ Mic denied");
  }
};

/* INIT */
loadHistoryList();
</script>

</body>
</html>
